<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<title>Questionari</title>

<style>
body {
  font-family: Arial, sans-serif;
  max-width: 1000px;
  margin: auto;
  padding: 30px;
  line-height: 1.5;
}

h1, h2, p {
  text-align: center;
}

.form-section, .questions-section {
  margin-top: 30px;
}

.form-row {
  margin: 12px 0;
  text-align: center;
}

input, select {
  width: 100%;
  max-width: 420px;
  padding: 10px;
  font-size: 16px;
  box-sizing: border-box;
}

.question-item {
  border: 1px solid #ddd;
  border-radius: 8px;
  padding: 18px;
  margin: 18px 0;
}

.question-text {
  font-weight: bold;
  margin-bottom: 14px;
  text-align: left;
}

.block-intro {
  border: 1px solid #bbb;
  background: #f8f8f8;
  border-radius: 8px;
  padding: 18px;
  margin: 25px 0;
  text-align: left;
  white-space: pre-line;
}

.likert-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}

.likert-side {
  font-size: 14px;
  min-width: 140px;
}

.likert-options {
  display: flex;
  gap: 14px;
  flex-wrap: wrap;
  justify-content: center;
  flex: 1;
}

.likert-options label {
  display: flex;
  flex-direction: column;
  align-items: center;
  font-size: 14px;
  cursor: pointer;
  min-width: 55px;
}

.likert-options input {
  width: auto;
  margin-bottom: 6px;
}

button {
  display: block;
  margin: 30px auto;
  padding: 12px 28px;
  font-size: 16px;
  cursor: pointer;
}

.error {
  color: red;
  text-align: center;
  margin-top: 12px;
  font-weight: bold;
}

.success {
  color: green;
  text-align: center;
  margin-top: 12px;
  font-weight: bold;
}
</style>
</head>

<body>
<div id="container"></div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxX0MBymsNjQO-7qc1oInBldl9DVPpWuPT1QXiBbsGIq6fMcT-9tIfeMNhrHFHJA_vL/exec";

/* =========================
   QUESTIONARI ORIGINALI
========================= */

const q1Intro = `
Le seguenti affermazioni descrivono un gran numero di situazioni comuni.
Non esistono risposte “giuste” o “sbagliate”; la risposta migliore è quella immediata e spontanea.
Leggi attentamente ogni frase ed indica la risposta che riflette la tua prima reazione.
Per ciascuna affermazione, indica quanto è vera per te utilizzando la seguente scala:
1 = mai/quasi mai vero
2 = occasionalmente vero
3 = a volte vero
4 = spesso vero
5 = quasi sempre/sempre vero
`;

const questionnaire1 = [
  "Mi fa piacere aiutare i miei amici/colleghi nelle loro attività",
  "Condivido le cose che ho con i miei amici",
  "Cerco di aiutare gli altri",
  "Sono disponibile a svolgere attività di volontariato per aiutare chi ha bisogno",
  "Sono empatico/a con chi ha bisogno",
  "Aiuto immediatamente chi ha bisogno",
  "Faccio ciò che posso per aiutare gli altri a evitare di mettersi nei guai",
  "Sento intensamente ciò che gli altri provano",
  "Sono disposto/a a mettere le mie conoscenze e capacità a disposizione degli altri",
  "Cerco di consolare chi è triste",
  "Presto facilmente denaro o altre cose",
  "Mi metto facilmente nei panni di chi si trova in difficoltà",
  "Cerco di stare vicino e prendermi cura di chi ha bisogno",
  "Condivido facilmente con gli amici ogni buona opportunità che mi si presenta",
  "Dedico tempo agli amici che si sentono soli",
  "Percepisco immediatamente il disagio dei miei amici anche quando non mi viene comunicato direttamente"
];

const q2Intro = `
Di seguito sono elencate alcune situazioni in cui potresti aiutare altre persone.
Immagina che ciascuna di queste situazioni si presenti realmente.
Indica quanto saresti disposto/a a mettere in atto ciascun comportamento.
Non esistono risposte “giuste” o “sbagliate”: rispondi in modo spontaneo, in base a ciò che faresti davvero.
Se un’affermazione include più esempi, rispondi pensando all’azione che saresti più propenso/a a compiere.

Scala di risposta (Likert 1–7)
1 = Sicuramente non lo farei
2 = Probabilmente non lo farei
3 = Poco probabile
4 = Né probabile né improbabile
5 = Abbastanza probabile
6 = Probabilmente lo farei
7 = Sicuramente lo farei
`;

const questionnaire2 = [
  "Consolare qualcuno che conosco dopo che ha vissuto una difficoltà",
  "Prendermi cura di un amico o parente malato",
  "Aiutare uno sconosciuto a trovare qualcosa che ha perso (es. chiavi o animale domestico)",
  "Aiutare uno sconosciuto con un piccolo compito (es. portare la spesa, sorvegliare i suoi oggetti)"
];

/* =========================
   NUOVI QUESTIONARI
========================= */

const masIntro = `
Di seguito sono riportate alcune affermazioni che riguardano il modo in cui ti assumi la responsabilità delle tue azioni e delle loro conseguenze.
Immagina di riflettere sul tuo comportamento nella vita quotidiana.
Indica quanto sei d’accordo con ciascuna affermazione, basandoti su ciò che pensi davvero.
Non esistono risposte “giuste” o “sbagliate”: rispondi in modo spontaneo e sincero.

Scala di risposta (Likert 1–7)
1 = Fortemente in disaccordo
2 = In disaccordo
3 = Abbastanza in disaccordo
4 = Né d’accordo né in disaccordo
5 = Abbastanza d’accordo
6 = D’accordo
7 = Fortemente d’accordo
`;

const questionnaireMAS = [
  "Mi sento responsabile delle conseguenze delle mie azioni.",
  "Cerco di fare ciò che è giusto, anche quando è difficile.",
  "Quando faccio qualcosa di sbagliato, cerco di rimediare.",
  "Le mie scelte dipendono principalmente da me.",
  "Mi impegno a comportarmi in modo coerente con i miei valori morali.",
  "Anche quando nessuno mi osserva, cerco di fare la cosa giusta.",
  "Quando prendo una decisione, considero le conseguenze per gli altri.",
  "Mi assumo la responsabilità dei miei errori.",
  "A volte mi comporto senza pensare alle conseguenze.",
  "Se qualcosa va storto, tendo a dare la colpa agli altri.",
  "Cerco di controllare il mio comportamento anche in situazioni difficili.",
  "Le mie azioni riflettono ciò che penso sia giusto o sbagliato."
];

const iriIntro = `
Di seguito sono riportate alcune affermazioni riguardanti pensieri e reazioni che le persone possono avere nelle situazioni quotidiane.
Indica quanto ciascuna affermazione ti descrive.
Non esistono risposte giuste o sbagliate: rispondi in modo spontaneo e sincero.

Scala di risposta (Likert 1–5)
1 = Non mi descrive per niente
2 = Mi descrive poco
3 = Mi descrive abbastanza
4 = Mi descrive molto
5 = Mi descrive perfettamente
`;

const questionnaireIRI = [
  "Spesso mi immedesimo nei personaggi di un romanzo o di un film.",
  "Riesco facilmente a mettermi nei panni dei personaggi di un racconto o di un film.",
  "Quando guardo un film, riesco molto facilmente a mettermi nei panni di un personaggio.",
  "Quando leggo una storia interessante, immagino come mi sentirei se gli avvenimenti della storia accadessero a me.",
  "Mi immedesimo nei personaggi dei film o dei romanzi.",
  "Dopo aver visto uno spettacolo teatrale o un film, mi sento coinvolto/a come se fosse una storia vera.",
  "Spesso provo sentimenti di tenerezza e di preoccupazione per le persone meno fortunate di me.",
  "A volte non mi sento molto dispiaciuto/a per altre persone quando hanno dei problemi.",
  "Quando vedo qualcuno che viene sfruttato, provo sentimenti di protezione nei suoi confronti.",
  "Quando vedo qualcuno che viene trattato ingiustamente, talvolta mi sento di proteggerlo.",
  "Ho spesso profondi sentimenti di compassione per le persone meno fortunate di me.",
  "Quando vedo qualcuno in difficoltà, provo sentimenti di tenerezza.",
  "A volte cerco di comprendere meglio i miei amici immaginando come le cose appaiono dalla loro prospettiva.",
  "Se non sono sicuro/a di avere ragione riguardo a qualcosa, non sposo molto la mia idea ma ascolto le argomentazioni degli altri.",
  "Cerco di considerare tutti gli aspetti prima di prendere una decisione.",
  "Quando sono in disaccordo con qualcuno, cerco di “mettermi nei suoi panni” per un attimo.",
  "Prima di criticare qualcuno, cerco di immaginare cosa proverei se fossi al suo posto.",
  "Quando devo decidere, cerco di considerare il punto di vista degli altri.",
  "In situazioni di emergenza, mi sento a disagio.",
  "Quando vedo qualcuno ferirsi, mi sento a disagio.",
  "Trovandomi in situazioni che provocano tensione emotiva, mi spavento.",
  "Sono facilmente coinvolto/a emotivamente nelle situazioni di emergenza.",
  "Tendo a perdere il controllo in situazioni di forte stress.",
  "Quando vedo qualcuno che ha bisogno di aiuto in una situazione di emergenza, mi sento a disagio."
];

const identitaIntro = `
Di seguito sono riportate alcune affermazioni che riguardano il modo in cui percepisci te stesso/a.
Leggi attentamente ciascuna affermazione e indica quanto sei d’accordo, basandoti su ciò che pensi davvero.
Non esistono risposte “giuste” o “sbagliate”: rispondi in modo spontaneo e sincero.

Scala di risposta (Likert 1–7)
1 = Fortemente in disaccordo
2 = In disaccordo
3 = Abbastanza in disaccordo
4 = Né d’accordo né in disaccordo
5 = Abbastanza d’accordo
6 = D’accordo
7 = Fortemente d’accordo
`;

const questionnaireIdentita = [
  "In generale, ho un’idea chiara di chi sono e di cosa sono.",
  "Le mie convinzioni su me stesso/a cambiano spesso.",
  "Trovo difficile definire me stesso/a.",
  "Le mie opinioni su di me sono molto stabili nel tempo.",
  "A volte sento di non sapere davvero chi sono.",
  "Ho una visione coerente di me stesso/a.",
  "Il modo in cui mi descrivo cambia spesso a seconda della situazione.",
  "Ho un’identità ben definita.",
  "Mi capita di sentirmi confuso/a riguardo a chi sono.",
  "Le mie caratteristiche personali sono chiare e ben definite."
];

let participantData = {};

let responses1 = [];
let responses2 = [];
let responsesMAS = [];
let responsesIRI = [];
let responsesIdentita = [];

function makeOptions(min, max) {
  const options = [];
  for (let i = min; i <= max; i++) {
    options.push({ value: i, label: String(i) });
  }
  return options;
}

function renderQuestionList(questions, namePrefix, options, leftLabel, rightLabel, startIndex = 1) {
  return questions.map((q, i) => `
    <div class="question-item">
      <div class="question-text">${startIndex + i}. ${q}</div>
      <div class="likert-row">
        <div class="likert-side">${leftLabel}</div>
        <div class="likert-options">
          ${options.map(opt => `
            <label>
              <input type="radio" name="${namePrefix}${i}" value="${opt.value}">
              ${opt.label}
            </label>
          `).join("")}
        </div>
        <div class="likert-side" style="text-align:right;">${rightLabel}</div>
      </div>
    </div>
  `).join("");
}

function renderIntro() {
  document.getElementById("container").innerHTML = `
    <h1>Questionari</h1>
    <p>Compila i dati iniziali e premi Avanti.</p>

    <div class="form-section">
      <div class="form-row">
        <input id="id" placeholder="Numero partecipante">
      </div>

      <div class="form-row">
        <select id="sesso">
          <option value="">Seleziona sesso</option>
          <option value="Maschio">Maschio</option>
          <option value="Femmina">Femmina</option>
          <option value="Altro">Altro</option>
          <option value="Preferisco non rispondere">Preferisco non rispondere</option>
        </select>
      </div>

      <div class="form-row">
        <input id="dataNascita" type="date">
      </div>

      <div class="form-row">
        <input id="altezza" type="number" step="0.1" placeholder="Altezza (cm)">
      </div>

      <div class="form-row">
        <input id="peso" type="number" step="0.1" placeholder="Peso (kg)">
      </div>
    </div>

    <div id="err" class="error"></div>
    <button onclick="goToQ1()">Avanti</button>
  `;
}

function goToQ1() {
  const id = document.getElementById("id").value.trim();
  const sesso = document.getElementById("sesso").value;
  const dataNascita = document.getElementById("dataNascita").value;
  const altezza = document.getElementById("altezza").value.trim();
  const peso = document.getElementById("peso").value.trim();

  if (!id || !sesso || !dataNascita || !altezza || !peso) {
    document.getElementById("err").innerText = "Compila tutti i dati iniziali.";
    return;
  }

  participantData = { id, sesso, data_nascita: dataNascita, altezza, peso };

  document.getElementById("container").innerHTML = `
    <h1>Questionario 1</h1>
    <div class="block-intro">${q1Intro}</div>
    <div class="questions-section">
      ${renderQuestionList(questionnaire1, "q1_", makeOptions(1, 5), "Mai/quasi mai vero", "Quasi sempre/sempre vero")}
    </div>
    <div id="err" class="error"></div>
    <button onclick="goToQ2()">Avanti</button>
  `;
}

function goToQ2() {
  responses1 = [];

  for (let i = 0; i < questionnaire1.length; i++) {
    const selected = document.querySelector(`input[name="q1_${i}"]:checked`);
    if (!selected) {
      document.getElementById("err").innerText = `Rispondi a tutte le domande del Questionario 1. Manca la domanda ${i + 1}.`;
      return;
    }

    responses1.push({
      ...participantData,
      questionario: "Questionario1",
      scala: "1-5",
      item: i + 1,
      domanda: questionnaire1[i],
      risposta: selected.value
    });
  }

  document.getElementById("container").innerHTML = `
    <h1>Questionario 2</h1>
    <div class="block-intro">${q2Intro}</div>
    <div class="questions-section">
      ${renderQuestionList(questionnaire2, "q2_", makeOptions(1, 7), "Sicuramente non lo farei", "Sicuramente lo farei")}
    </div>
    <div id="err" class="error"></div>
    <button onclick="goToMAS()">Avanti</button>
  `;
}

function goToMAS() {
  responses2 = [];

  for (let i = 0; i < questionnaire2.length; i++) {
    const selected = document.querySelector(`input[name="q2_${i}"]:checked`);
    if (!selected) {
      document.getElementById("err").innerText = `Rispondi a tutte le domande del Questionario 2. Manca la domanda ${i + 1}.`;
      return;
    }

    responses2.push({
      ...participantData,
      questionario: "Questionario2",
      scala: "1-7",
      item: i + 1,
      domanda: questionnaire2[i],
      risposta: selected.value
    });
  }

  document.getElementById("container").innerHTML = `
    <h1>Questionario 3 - MAS</h1>
    <div class="block-intro">${masIntro}</div>
    <div class="questions-section">
      ${renderQuestionList(questionnaireMAS, "mas_", makeOptions(1, 7), "Fortemente in disaccordo", "Fortemente d’accordo")}
    </div>
    <div id="err" class="error"></div>
    <button onclick="goToIRI()">Avanti</button>
  `;
}

function goToIRI() {
  responsesMAS = [];

  for (let i = 0; i < questionnaireMAS.length; i++) {
    const selected = document.querySelector(`input[name="mas_${i}"]:checked`);
    if (!selected) {
      document.getElementById("err").innerText = `Rispondi a tutte le domande del Questionario MAS. Manca la domanda ${i + 1}.`;
      return;
    }

    responsesMAS.push({
      ...participantData,
      questionario: "MAS",
      scala: "1-7",
      item: i + 1,
      domanda: questionnaireMAS[i],
      risposta: selected.value
    });
  }

  document.getElementById("container").innerHTML = `
    <h1>Questionario 4 - IRI</h1>
    <div class="block-intro">${iriIntro}</div>
    <div class="questions-section">
      ${renderQuestionList(questionnaireIRI, "iri_", makeOptions(1, 5), "Non mi descrive per niente", "Mi descrive perfettamente")}
    </div>
    <div id="err" class="error"></div>
    <button onclick="goToIdentita()">Avanti</button>
  `;
}

function goToIdentita() {
  responsesIRI = [];

  for (let i = 0; i < questionnaireIRI.length; i++) {
    const selected = document.querySelector(`input[name="iri_${i}"]:checked`);
    if (!selected) {
      document.getElementById("err").innerText = `Rispondi a tutte le domande del Questionario IRI. Manca la domanda ${i + 1}.`;
      return;
    }

    responsesIRI.push({
      ...participantData,
      questionario: "IRI",
      scala: "1-5",
      item: i + 1,
      domanda: questionnaireIRI[i],
      risposta: selected.value
    });
  }

  document.getElementById("container").innerHTML = `
    <h1>Questionario 5</h1>
    <div class="block-intro">${identitaIntro}</div>
    <div class="questions-section">
      ${renderQuestionList(questionnaireIdentita, "identita_", makeOptions(1, 7), "Fortemente in disaccordo", "Fortemente d’accordo")}
    </div>
    <div id="err" class="error"></div>
    <div id="msg"></div>
    <button onclick="submitAll()">Invia</button>
  `;
}

async function submitAll() {
  responsesIdentita = [];

  for (let i = 0; i < questionnaireIdentita.length; i++) {
    const selected = document.querySelector(`input[name="identita_${i}"]:checked`);
    if (!selected) {
      document.getElementById("err").innerText = `Rispondi a tutte le domande del Questionario 5. Manca la domanda ${i + 1}.`;
      return;
    }

    responsesIdentita.push({
      ...participantData,
      questionario: "Identita",
      scala: "1-7",
      item: i + 1,
      domanda: questionnaireIdentita[i],
      risposta: selected.value
    });
  }

  const allResponses = [
    ...responses1,
    ...responses2,
    ...responsesMAS,
    ...responsesIRI,
    ...responsesIdentita
  ];

  document.getElementById("err").innerText = "";
  document.getElementById("msg").innerHTML = "<p>Invio delle risposte in corso...</p>";

  try {
    const res = await fetch(SCRIPT_URL, {
      method: "POST",
      body: JSON.stringify({ responses: allResponses }),
      headers: {
        "Content-Type": "text/plain;charset=utf-8"
      }
    });

    const result = await res.json();

    if (result.ok) {
      document.getElementById("msg").innerHTML =
        "<p class='success'>Risposte salvate correttamente.</p>";
      window.scrollTo({ top: 0, behavior: "smooth" });
    } else {
      document.getElementById("msg").innerHTML =
        "<p class='error'>Errore nel salvataggio: " + (result.error || "sconosciuto") + "</p>";
    }
  } catch (err) {
    document.getElementById("msg").innerHTML =
      "<p class='error'>Errore di connessione: " + err.message + "</p>";
  }
}

renderIntro();
</script>
</body>
</html>
